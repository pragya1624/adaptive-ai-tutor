<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Adaptive AI Tutor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        nav {
            background: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        nav .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #60a5fa;
        }
        nav .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        nav .nav-links a:hover { color: #60a5fa; }

        /* ── Main container ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── Cards ── */
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #334155;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            color: #60a5fa;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        /* ── Buttons ── */
        .btn {
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger  { background: #ef4444; color: white; }
        .btn-ghost   { background: #334155; color: #e2e8f0; }

        /* ── Progress bar ── */
        .progress-bar {
            background: #334155;
            border-radius: 99px;
            height: 10px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.4s;
        }
        .mastered    .progress-fill { background: #22c55e; }
        .learning    .progress-fill { background: #3b82f6; }
        .beginner    .progress-fill { background: #f59e0b; }
        .not_started .progress-fill { background: #475569; }

        /* ── Badge ── */
        .badge {
            padding: 0.2rem 0.7rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-curious  { background: #1d4ed8; color: #bfdbfe; }
        .badge-lazy     { background: #991b1b; color: #fecaca; }
        .badge-anxious  { background: #92400e; color: #fde68a; }

        /* ── Grid ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

        /* ── Stat box ── */
        .stat {
            text-align: center;
            padding: 1rem;
            background: #0f172a;
            border-radius: 10px;
        }
        .stat .value {
            font-size: 2rem;
            font-weight: 700;
            color: #60a5fa;
        }
        .stat .label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* ── Form ── */
        input, select {
            width: 100%;
            padding: 0.7rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 4px;
            display: block;
        }

        /* ── Table ── */
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 0.75rem 1rem;
            background: #0f172a;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #1e293b;
            font-size: 0.9rem;
        }
        tr:hover td { background: #1e293b; }

        /* ── Result item ── */
        .result-item {
            background: #0f172a;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            border-left: 3px solid #3b82f6;
        }
        .result-item.warning { border-left-color: #f59e0b; }
        .result-item.success { border-left-color: #22c55e; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🎓 Adaptive AI Tutor</div>
        <div class="nav-links">
            {% if session.student_name %}
                <a href="/dashboard">Dashboard</a>
                <a href="/leaderboard">Leaderboard</a>
                <a href="/logout">Logout ({{ session.student_name }})</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
